<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oman POS" />
    <meta name="description" content="نظام نقاط البيع والمخزون - Oman POS System" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <title>Oman POS - نظام نقاط البيع</title>
  </head>
  <body>
    <div id="install-prompt" style="display: none;" class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-80 bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-4 z-50 border border-gray-200 dark:border-slate-700">
      <div class="flex items-start gap-3">
        <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-xl flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="font-semibold text-gray-900 dark:text-white" id="install-title">تثبيت التطبيق</h3>
          <p class="text-sm text-gray-500 mt-1" id="install-desc">ثبّت التطبيق على جهازك للوصول السريع</p>
          <div class="flex gap-2 mt-3">
            <button onclick="installApp()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">تثبيت</button>
            <button onclick="dismissInstall()" class="px-4 py-2 text-gray-500 text-sm">لاحقاً</button>
          </div>
        </div>
      </div>
    </div>
    
    <div id="offline-indicator" style="display: none;" class="fixed top-0 left-0 right-0 bg-yellow-500 text-white text-center py-2 text-sm font-medium z-50">
      🔴 أنت الآن Offline - البيانات محفوظة محلياً
    </div>
  </body>
</html>
